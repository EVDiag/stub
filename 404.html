<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0E0D0B" />
<meta name="robots" content="noindex" />
<title>Page not found &mdash; Stub</title>
<style>
  :root { --bg:#0E0D0B; --cream:#F4EDE2; --muted:#8B8278; --gold:#D4A574; --border:#2A2521; }
  * { box-sizing:border-box; margin:0; padding:0; }
  html,body { background:var(--bg); color:var(--cream); font-family:system-ui,-apple-system,'Segoe UI',sans-serif; -webkit-font-smoothing:antialiased; }
  .wrap { min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:32px; }
  .mark { font-size:28px; font-weight:700; letter-spacing:-0.5px; margin-bottom:28px; }
  .mark span { color:var(--gold); }
  h1 { font-size:56px; font-weight:700; letter-spacing:-1px; }
  p  { color:var(--muted); font-size:16px; margin:14px 0 30px; max-width:420px; line-height:1.55; }
  a  { color:var(--gold); text-decoration:none; }
  a:hover { text-decoration:underline; }
  .links { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; }
  .links a { border:1px solid var(--border); border-radius:999px; padding:10px 22px; font-size:14px; font-weight:600; }
  .links a.primary { background:var(--gold); color:var(--bg); border-color:var(--gold); }
  .es { margin-top:34px; font-size:13px; color:var(--muted); }
</style>
</head>
<body>
<div class="wrap">
  <div class="mark">stub<span>.</span></div>
  <h1>404</h1>
  <p>That page does not exist &mdash; it may have moved. Everything useful is one tap away.</p>
  <div class="links">
    <a class="primary" href="/">Home</a>
    <a href="/guides.html">Deduction guides</a>
    <a href="/support.html">Support</a>
  </div>
  <p class="es">&iquest;Buscas la versi&oacute;n en espa&ntilde;ol? <a href="/es/">Ir a la p&aacute;gina principal</a></p>
</div>
</body>
</html>
